name: CI Pipeline 

on:  
  push:  
    branches: [ main ]  
  pull_request:  
    branches: [ main ]  

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:14-alpine
        env: 
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypass
          POSTGRES_DB: mydatabase
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache-dependency-path: backend/package-lock.json
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Initialize database schema
        run: |
          PGPASSWORD=mypass psql -h localhost -U myuser -d mydatabase -c "
          CREATE TABLE IF NOT EXISTS todos (
            id SERIAL PRIMARY KEY,
            title VARCHAR(255) NOT NULL,
            completed BOOLEAN DEFAULT false,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"

      - name: Run tests
        run: npm test
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_USER: myuser
          DB_PASSWORD: mypass
          DB_NAME: mydatabase

      # --- PART C: DOCKER HUB DEPLOYMENT ---
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend 
          push: true
          # Tags the image with your Docker Hub username and "latest"
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-project:latest
  deploy: 
      name: Deploy to Server 
      runs-on: ubuntu-latest 
      needs: build-and-test 
      if: github.ref == 'refs/heads/main' 

      steps: 
        - name: Deploy to Server via SSH 
          uses: appleboy/ssh-action@master 
          with: 
            host: ${{ secrets.HOST }} 
            username: ${{ secrets.USERNAME }} 
            key: ${{ secrets.SSH_PRIVATE_KEY }} 
            script: | 
              cd /var/www/devops-group-1 
              sudo git pull origin main 
              sudo docker-compose pull 
              # This line stops and removes old containers/networks first
              sudo docker-compose down 
              sudo docker-compose up -d --build